# SonarQube project configuration
# See https://docs.sonarqube.org/latest/analysis/scan/sonarscanner-for-jenkins/

sonar.projectKey=jackelinenascimento_transcrito-app
sonar.projectName=transcrito-app
sonar.projectVersion=1.0

# Sources and tests
sonar.sources=src
sonar.tests=tests

# Python version used by the project (helps static analyzers)
sonar.python.version=3.10

# Optional: exclude virtualenvs and outputs
sonar.exclusions=.venv/**,venv/**,outputs/**,**/__pycache__/**
