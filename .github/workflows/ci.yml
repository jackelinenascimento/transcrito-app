name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies (CI-friendly)
        run: |
          # Upgrade pip, install only dev deps for testing. Avoid installing
          # runtime deps like openai-whisper/torch here (they are heavy and
          # not needed for unit tests). Install package editable without
          # pulling its install_requires.
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt || true
          pip install -e . --no-deps
          pip install pytest pytest-cov ruff

      - name: Lint
        run: |
          ruff check src tests || true

      - name: Run tests
        run: |
          pytest --junitxml=report.xml --cov=src --cov-report=xml:coverage.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.python-version }}
          path: report.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
